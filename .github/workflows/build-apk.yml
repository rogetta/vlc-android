name: Build APK

on:
  push:
    branches:
      - "**"

jobs:
  build:
    if: contains(github.event.head_commit.message, '[test build]') || contains(github.event.head_commit.message, '[release build]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/28.2.13676358" >> local.properties

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Upload armeabi-v7a
        uses: actions/upload-artifact@v4
        with:
          name: apk-armeabi-v7a
          path: application/app/build/outputs/apk/release/app-armeabi-v7a-release.apk
          if-no-files-found: error

      - name: Upload arm64-v8a
        uses: actions/upload-artifact@v4
        with:
          name: apk-arm64-v8a
          path: application/app/build/outputs/apk/release/app-arm64-v8a-release.apk
          if-no-files-found: error
